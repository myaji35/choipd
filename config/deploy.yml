# imPD Rails - Kamal Deploy Config
# 서버: Vultr ICN (158.247.235.31)
# 접속: http://impd.158.247.235.31.nip.io:3030
# 브랜드명 변경: choipd → impd (2026-04-20)
# 업데이트: 2026-04-20

service: choipd
image: myaji35/choipd

# ── 서버 설정 ──────────────────────────────
servers:
  web:
    - 158.247.235.31

# ── SSH 설정 ──────────────────────────────
ssh:
  user: root

# ── Proxy 설정 (kamal-proxy: 두 호스트 동시 서빙) ───
proxy:
  hosts:
    - impd.townin.net               # 메인 도메인 (DNS A → 158.247.235.31)
    - impd.158.247.235.31.nip.io    # nip.io fallback (DNS 안 거치는 직접 접근용)
  app_port: 3000
  healthcheck:
    # Rails 8 + SolidQueue 풀부팅 시 /up 200 응답까지 30~45초 소요.
    # 기본 30s 는 타임아웃 → 컨테이너 강제 종료로 반복 실패.
    timeout: 90
    interval: 3
    path: /up

# ── 레지스트리 (GitHub Container Registry) ──
registry:
  server: ghcr.io
  username: myaji35
  password:
    - KAMAL_REGISTRY_PASSWORD

# ── 환경변수 ──────────────────────────────
env:
  secret:
    - RAILS_MASTER_KEY
    - GOOGLE_OAUTH_CLIENT_SECRET
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_ENV: production
    PORT: "3000"
    WEB_CONCURRENCY: "1"
    RAILS_SERVE_STATIC_FILES: "true"
    # Google OAuth — Client ID는 public이라 clear로 관리 가능
    GOOGLE_OAUTH_CLIENT_ID: "515047956016-9k5n7n2t0ab9g72100u8b5o8391u047k.apps.googleusercontent.com"

# ── 볼륨 ──────────────────────────────────
volumes:
  - "choipd_storage:/rails/storage"

# ── 에셋 브릿지 ───────────────────────────
asset_path: /rails/public/assets

# ── 빌더 (서버 네이티브 amd64 빌드 — QEMU gcc segfault 회피) ──
builder:
  arch: amd64
  remote: ssh://root@158.247.235.31

# ── 별칭 ──────────────────────────────────
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  seed: app exec --reuse "bin/rails db:seed"
  migrate: app exec --reuse "bin/rails db:migrate"
